<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Map Style Hero</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    .hero-map-wrap {
      position: relative;
      width: 100%;
      max-width: 1200px;
      padding: 40px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-map-text {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-map-text-image {
      display: block;
      width: min(57vw, 760px);
      max-width: 100%;
      height: auto;
    }

    .hero-map-sparkle {
      position: absolute;
      left: 10%;
      top: 50%;
      transform: translateY(-38%);
      z-index: 3;
      width: min(14vw, 140px);
    }

    .hero-map-sparkle img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hero-map-star {
      position: absolute;
      right: 11%;
      top: 28%;
      z-index: 3;
      width: min(8vw, 82px);
    }

    .hero-map-star img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 991px) {
      .hero-map-wrap {
        padding: 24px 16px;
      }

      .hero-map-text-image {
        width: 92vw;
        max-width: 760px;
      }

      .hero-map-sparkle {
        left: 4%;
        top: 56%;
        width: min(21vw, 120px);
      }

      .hero-map-star {
        right: 5%;
        top: 24%;
        width: min(11vw, 64px);
      }
    }
  </style>
</head>
<body>
  <section class="hero-map-wrap">
    <div class="hero-map-sparkle">
      <img
        src="https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8e/icon-3d-sparkle.png"
        srcset="
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8e/icon-3d-sparkle-p-500.png 500w,
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8e/icon-3d-sparkle.png 720w
        "
        sizes="(max-width: 991px) 21vw, 14vw"
        alt="3D sparkle"
        loading="eager"
        decoding="async"
      />
    </div>

    <div class="hero-map-text">
      <img
        src="https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8c/text-themap.png"
        srcset="
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8c/text-themap-p-500.png 500w,
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8c/text-themap-p-800.png 800w,
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8c/text-themap-p-1080.png 1080w,
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f8c/text-themap.png 1440w
        "
        sizes="(max-width: 991px) 92vw, 57vw"
        alt="3D Balloon letters The map"
        class="hero-map-text-image"
        loading="eager"
        decoding="async"
      />
    </div>

    <div class="hero-map-star">
      <img
        src="https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f88/icon-3d-star.png"
        srcset="
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f88/icon-3d-star-p-500.png 500w,
          https://cdn.prod.website-files.com/667ad2c31e593132fcd80f3d/667ad2c31e593132fcd80f88/icon-3d-star.png 720w
        "
        sizes="(max-width: 991px) 11vw, 8vw"
        alt="3D star"
        loading="eager"
        decoding="async"
      />
    </div>
  </section>
</body>
</html>
