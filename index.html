<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Recruitment Agency Button</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-dark: #23212b;
      --color-light: #ffffff;
      --color-primary: #c579ff;
      --animation-primary: 0.4s cubic-bezier(0.5, 0.75, 0, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(180deg, #eadcf0 0%, #ffe9a8 100%);
    }

    .btn-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-decoration: none;
      transition: background-color var(--animation-primary);
      -webkit-tap-highlight-color: transparent;
    }

    .btn .btn-text {
      transition: color var(--animation-primary);
    }

    .btn:hover .btn-text {
      color: var(--color-light);
    }

    .btn .btn-border {
      transition: all var(--animation-primary);
    }

    .btn .btn-background {
      position: absolute;
      inset: 0;
      transform: translateY(101%) rotate(0.001deg);
      border-radius: 50% 50% 0 0;
      transition: all var(--animation-primary);
      z-index: 1;
    }

    .btn:hover .btn-background {
      transform: translateY(0%) rotate(0.001deg);
      border-radius: 0;
    }

    .btn .btn-text {
      position: relative;
      z-index: 2;
      transform: translateY(0%) rotate(0.001deg);
      transition: all var(--animation-primary);
    }

    .btn:hover .btn-text {
      transform: translateY(-101%) rotate(0.001deg);
    }

    .btn .btn-text.duplicate {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(150%) rotate(0.001deg);
      pointer-events: none;
    }

    .btn:hover .btn-text.duplicate {
      transform: translateY(0%) rotate(0.001deg);
    }

    .btn.filled {
      background-color: var(--color-dark);
      box-shadow: 0 2px 0 rgba(255,255,255,0.04) inset;
    }

    .btn.filled .btn-border {
      display: none;
    }

    .btn.filled .btn-text {
      color: var(--color-light);
    }

    .btn.filled .btn-text.duplicate {
      color: var(--color-light);
    }

    .btn.filled .btn-background {
      background-color: var(--color-primary);
    }

    .hero-btn {
      min-width: 405px;
      height: 66px;
      padding: 0 34px;
      border-radius: 999px;
    }

    .hero-btn .btn-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      text-align: center;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .hero-btn {
        min-width: min(100%, 360px);
        width: min(100%, 360px);
        height: 60px;
        padding: 0 24px;
      }

      .hero-btn .btn-text {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="btn-wrap">
    <a href="#" class="btn filled hero-btn">
      <div class="btn-background"></div>
      <span class="btn-text">VA RECRUITMENT AGENCY</span>
      <span class="btn-text duplicate">VA RECRUITMENT AGENCY</span>
      <div class="btn-border"></div>
    </a>
  </div>
</body>
</html>
