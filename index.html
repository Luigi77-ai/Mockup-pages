<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --text: #000000;
      --pill: #000000;
      --pill-text: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 24px 18px 40px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .brand {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.8rem, 5vw, 5rem);
      line-height: 0.9;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .brand .mark {
      display: inline-block;
      position: relative;
      margin-left: 4px;
    }

    .brand .mark::after {
      content: "S";
      position: absolute;
      inset: 0;
      transform: scale(0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #000;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      line-height: 1;
    }

    .actions {
      display: flex;
      gap: 14px;
      align-items: center;
      padding-top: 6px;
    }

    .menu-btn,
    .circle-btn {
      background: #000;
      color: #fff;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .menu-btn {
      height: 70px;
      min-width: 88px;
      padding: 0 18px;
      border-radius: 18px;
      font-family: 'Anton', sans-serif;
      font-size: 1.25rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .circle-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 1.5rem;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    .headline {
      width: min(920px, 100%);
      font-family: 'Anton', sans-serif;
      text-transform: uppercase;
      color: #000;
      line-height: 0.9;
      font-size: clamp(3rem, 7vw, 7rem);
      letter-spacing: 0.5px;
    }

    .line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .line + .line {
      margin-top: 12px;
    }

    .media-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 8px;
      background: #111;
      flex-shrink: 0;
    }

    .media-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .burger-card {
      width: 156px;
      height: 74px;
      background: #111;
    }

    .logo-card {
      width: 410px;
      height: 74px;
      background: #1b1b1b;
      color: #fff;
      padding: 0 22px;
      justify-content: space-between;
      font-family: Arial, sans-serif;
    }

    .logo-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-badge {
      width: 44px;
      height: 44px;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .logo-text strong {
      font-size: 1.2rem;
      letter-spacing: 0.4px;
    }

    .logo-text span {
      font-size: 0.72rem;
      opacity: 0.9;
      margin-top: 3px;
    }

    .logo-right {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .bowl-card {
      width: 128px;
      height: 74px;
      background: #111;
    }

    @media (max-width: 900px) {
      .menu-btn {
        height: 58px;
        min-width: 78px;
        border-radius: 16px;
        font-size: 1rem;
      }

      .circle-btn {
        width: 58px;
        height: 58px;
      }

      .logo-card {
        width: 100%;
        max-width: 360px;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 18px 14px 32px;
      }

      .topbar {
        align-items: center;
        margin-bottom: 28px;
      }

      .brand {
        font-size: 3rem;
      }

      .hero {
        justify-content: flex-start;
        align-items: center;
      }

      .headline {
        font-size: clamp(2.6rem, 12vw, 4.8rem);
        line-height: 0.92;
      }

      .line {
        gap: 10px;
      }

      .burger-card,
      .bowl-card {
        width: 100px;
        height: 58px;
      }

      .logo-card {
        height: 58px;
        padding: 0 14px;
      }

      .logo-badge {
        width: 34px;
        height: 34px;
        font-size: 0.7rem;
      }

      .logo-text strong {
        font-size: 0.95rem;
      }

      .logo-text span {
        font-size: 0.58rem;
      }

      .logo-right {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        flex-direction: column;
        gap: 18px;
      }

      .actions {
        align-self: flex-end;
      }

      .headline {
        font-size: clamp(2.2rem, 14vw, 4rem);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand" aria-label="Sessions">
        SESSION<span class="mark">S</span>
      </div>

      <div class="actions">
        <button class="menu-btn">Menu</button>
        <button class="circle-btn" aria-label="Open dropdown">▼</button>
      </div>
    </header>

    <main class="hero">
      <section class="headline">
        <div class="line">
          <span>We turn loved food</span>

          <div class="media-card burger-card">
            <img
              src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80"
              alt="Burger"
            />
          </div>
        </div>

        <div class="line">
          <span>Brands</span>

          <div class="media-card logo-card">
            <div class="logo-left">
              <div class="logo-badge">LB</div>
              <div class="logo-text">
                <strong>LITTLE BAO BOY</strong>
                <span>北方包子男孩</span>
              </div>
            </div>
            <div class="logo-right">BANG</div>
          </div>

          <span>Into</span>
        </div>

        <div class="line">
          <div class="media-card bowl-card">
            <img
              src="https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=600&q=80"
              alt="Bowl of food"
            />
          </div>

          <span>National Franchises</span>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
