<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Recruitment Agency Button</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-dark: #232129;
      --color-light: #ffffff;
      --color-primary: #c579ff;
      --animation-primary: 0.4s cubic-bezier(0.5, 0.75, 0, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #ead7fb 0%, #ffe89d 100%);
      font-family: 'Inter', sans-serif;
      padding: 24px;
    }

    .btn-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-decoration: none;
      transition: background-color var(--animation-primary);
      -webkit-tap-highlight-color: transparent;
    }

    .btn .btn-text {
      transition: color var(--animation-primary);
    }

    .btn:hover .btn-text {
      color: var(--color-light);
    }

    .btn .btn-border {
      transition: all var(--animation-primary);
    }

    .btn .btn-background {
      position: absolute;
      inset: 0;
      transform: translateY(101%) rotate(0.001deg);
      border-radius: 50% 50% 0 0;
      transition: all var(--animation-primary);
      z-index: 1;
    }

    .btn:hover .btn-background {
      transform: translateY(0%) rotate(0.001deg);
      border-radius: 0% 0% 0 0;
      transition: all var(--animation-primary);
    }

    .btn .btn-text {
      position: relative;
      z-index: 2;
      transform: translateY(0%) rotate(0.001deg);
      transition: all var(--animation-primary);
    }

    .btn:hover .btn-text {
      transform: translateY(-101%) rotate(0.001deg);
    }

    .btn .btn-text.duplicate {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, 150%) rotate(0.001deg);
      z-index: 2;
      width: calc(100% - 40px);
      text-align: center;
      pointer-events: none;
    }

    .btn:hover .btn-text.duplicate {
      transform: translate(-50%, -50%) rotate(0.001deg);
    }

    .btn.filled {
      background-color: var(--color-dark);
    }

    .btn.filled .btn-border {
      display: none;
    }

    .btn.filled .btn-text {
      color: var(--color-light);
    }

    .btn.filled .btn-text.duplicate {
      color: var(--color-light);
    }

    .btn.filled .btn-background {
      background-color: var(--color-primary);
    }

    .va-btn {
      min-width: 360px;
      min-height: 64px;
      padding: 0 34px;
      border-radius: 999px;
    }

    .va-btn .btn-text {
      font-size: 18px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      white-space: normal;
    }

    @media (max-width: 480px) {
      .va-btn {
        min-width: 100%;
        width: 100%;
        min-height: 60px;
        padding: 0 24px;
      }

      .va-btn .btn-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="btn-wrap">
    <a href="#" class="btn filled va-btn">
      <div class="btn-background"></div>
      <p class="btn-text">VA RECRUITMENT AGENCY</p>
      <p class="btn-text duplicate">VA RECRUITMENT AGENCY</p>
      <div class="btn-border"></div>
    </a>
  </div>
</body>
</html>
