<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Boss Agency Co | Home</title>
  <meta
    name="description"
    content="The Boss Agency Co home section mockup."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root{
      --bg:#ffffff;
      --text:#16110d;
      --brand-orange:#E07A2F;
      --menu-rail-width:88px;
      --sidebar-width:300px;
      --menu-total-width:calc(var(--menu-rail-width) + var(--sidebar-width));
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;scroll-behavior:smooth}
    body{
      font-family:"Be Vietnam Pro",sans-serif;
      color:var(--text);
      background:#ffffff;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button{font:inherit}

    .menu-shell{
      position:fixed;
      top:0;
      left:0;
      width:var(--menu-total-width);
      height:100vh;
      z-index:60;
      display:flex;
      transform:translateX(calc(-1 * var(--sidebar-width)));
      transition:transform .34s ease;
      pointer-events:none;
    }

    body.menu-open .menu-shell{
      transform:translateX(0);
      pointer-events:auto;
    }

    .menu-trigger{
      width:var(--menu-rail-width);
      height:100vh;
      border:none;
      background:var(--brand-orange);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      flex:0 0 auto;
      position:relative;
      z-index:2;
      pointer-events:auto;
    }

    .menu-trigger-inner{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:20px 0;
      background:transparent;
    }

    .menu-tab-text{
      writing-mode:vertical-rl;
      transform:rotate(180deg);
      font-size:22px;
      line-height:.92;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-weight:800;
      color:#ffffff;
      user-select:none;
      white-space:nowrap;
    }

    .menu-tab-line{
      width:4px;
      height:250px;
      border-radius:999px;
      background:#ffffff;
      flex:0 0 auto;
    }

    .menu-panel{
      width:var(--sidebar-width);
      height:100vh;
      padding:24px 20px;
      background:var(--brand-orange);
      color:#ffffff;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:18px;
    }

    .brand-box{
      border-radius:16px;
      overflow:hidden;
      background:rgba(255,255,255,.16);
      color:#ffffff;
      padding:16px;
      border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(10px);
    }

    .brand{
      display:inline-block;
      font-size:1.05rem;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .nav-stack{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .nav-link{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      padding:14px;
      background:rgba(255,255,255,.14);
      border-radius:14px;
      color:#ffffff;
      font-size:14px;
      font-weight:700;
      transition:transform .2s ease,background .2s ease;
      border:1px solid rgba(255,255,255,.12);
    }

    .nav-link:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.22);
    }

    .nav-link small{
      width:28px;
      height:28px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#ffffff;
      font-size:12px;
      font-weight:800;
      color:var(--brand-orange);
    }

    .menu-socials{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .menu-socials a{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.14);
      color:#ffffff;
      transition:transform .2s ease,background .2s ease,color .2s ease;
    }

    .menu-socials a:hover{
      transform:translateY(-2px);
      background:#ffffff;
      color:var(--brand-orange);
    }

    .menu-socials svg{
      width:18px;
      height:18px;
      fill:currentColor;
    }

    .layout{
      min-height:100vh;
      margin-left:var(--menu-rail-width);
      transition:margin-left .34s ease;
      background:#ffffff;
    }

    body.menu-open .layout{
      margin-left:var(--menu-total-width);
    }

    .content{
      padding:24px;
      background:#ffffff;
    }

    .hero{
      min-height:calc(100vh - 48px);
      padding:0;
      background:#ffffff;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:stretch;
    }

    .hero-inner{
      width:100%;
      max-width:1500px;
      margin:0 auto;
      min-height:calc(100vh - 48px);
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      position:relative;
      z-index:1;
    }

    .hero-topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:24px;
      padding:0 6px;
      margin-bottom:24px;
    }

    .hero-mark{
      display:inline-flex;
      align-items:flex-start;
      justify-content:flex-start;
      color:#000000;
      font-size:clamp(3.2rem,7vw,5.8rem);
      line-height:.86;
      letter-spacing:-.08em;
      font-weight:900;
      text-transform:uppercase;
      user-select:none;
    }

    .hero-mark span{
      display:inline-block;
      position:relative;
    }

    .hero-mark span::after{
      content:"";
      display:inline-block;
      width:.72em;
      height:.72em;
      border:6px solid #000;
      border-radius:999px;
      margin-left:.06em;
      vertical-align:middle;
      transform:translateY(-.03em);
    }

    .hero-actions-top{
      display:flex;
      align-items:center;
      gap:12px;
      padding-top:2px;
      flex-shrink:0;
    }

    .hero-menu-pill,
    .hero-menu-circle{
      border:none;
      background:#000000;
      color:#ffffff;
      cursor:pointer;
      transition:transform .2s ease,opacity .2s ease;
    }

    .hero-menu-pill:hover,
    .hero-menu-circle:hover{
      transform:translateY(-1px);
      opacity:.92;
    }

    .hero-menu-pill{
      min-width:74px;
      height:60px;
      padding:0 16px;
      border-radius:16px;
      font-size:1.05rem;
      font-weight:900;
      letter-spacing:-.03em;
      text-transform:uppercase;
    }

    .hero-menu-circle{
      width:60px;
      height:60px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:1.15rem;
      font-weight:900;
      line-height:1;
    }

    .hero-center{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 0 36px;
    }

    .hero-copy{
      width:100%;
      max-width:980px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      text-align:left;
    }

    .hero-editorial-title{
      width:100%;
      margin:0;
      color:#000000;
      font-size:clamp(3.2rem,6.8vw,7rem);
      line-height:.9;
      letter-spacing:-.09em;
      font-weight:900;
      text-transform:uppercase;
    }

    .hero-editorial-title .line{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:nowrap;
      white-space:nowrap;
    }

    .hero-editorial-title .line + .line{
      margin-top:14px;
    }

    .hero-chip-dark{
      min-width:360px;
      height:64px;
      border-radius:10px;
      background:#191919;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:#ffffff;
      padding:0 22px;
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
    }

    .hero-chip-dark::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,0));
      pointer-events:none;
    }

    .hero-chip-brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      width:100%;
      font-size:.92rem;
      font-weight:800;
      letter-spacing:.02em;
      text-transform:uppercase;
      position:relative;
      z-index:1;
    }

    .hero-chip-brand strong{
      font-size:1.05rem;
      letter-spacing:-.03em;
      font-weight:900;
    }

    .hero-image-card{
      position:relative;
      flex:0 0 auto;
      overflow:hidden;
      border-radius:10px;
      background:#111;
      box-shadow:0 10px 24px rgba(0,0,0,.12);
    }

    .hero-image-card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hero-image-card.top-card{
      width:130px;
      height:70px;
      transform:translateY(-4px);
    }

    .hero-image-card.bottom-card{
      width:108px;
      height:66px;
      transform:translateY(2px);
    }

    .hero-editorial-sub{
      margin:28px 0 0;
      max-width:700px;
      color:#3f3a35;
      font-size:15px;
      line-height:1.7;
      font-weight:600;
      letter-spacing:-.01em;
    }

    @media (max-width:1180px){
      .hero-editorial-title .line{
        flex-wrap:wrap;
        white-space:normal;
      }
      .hero-chip-dark{
        min-width:300px;
      }
    }

    @media (max-width:780px){
      .hero-topbar{
        align-items:flex-start;
        gap:16px;
      }

      .hero-mark{
        font-size:clamp(2.2rem,10vw,3.6rem);
      }

      .hero-menu-pill{
        min-width:62px;
        height:48px;
        font-size:.88rem;
        border-radius:14px;
        padding:0 14px;
      }

      .hero-menu-circle{
        width:48px;
        height:48px;
        font-size:.92rem;
      }

      .hero-center{
        padding:12px 0 20px;
      }

      .hero-editorial-title{
        font-size:clamp(2.5rem,12vw,4.3rem);
        line-height:.92;
      }

      .hero-chip-dark{
        min-width:100%;
        width:100%;
        height:58px;
      }

      .hero-image-card.top-card{
        width:108px;
        height:58px;
      }

      .hero-image-card.bottom-card{
        width:92px;
        height:56px;
      }

      .hero-editorial-sub{
        margin-top:22px;
        font-size:14px;
      }
    }

    @media (max-width:760px){
      :root{
        --menu-rail-width:78px;
        --sidebar-width:260px;
        --menu-total-width:calc(var(--menu-rail-width) + var(--sidebar-width));
      }
    }

    @media (max-width:500px){
      .hero-copy{
        max-width:100%;
      }

      .hero-editorial-title .line{
        gap:12px;
      }

      .hero-mark span::after{
        border-width:4px;
      }
    }
  </style>
</head>
<body>
  <div class="menu-shell">
    <aside class="menu-panel" id="sideMenu">
      <div class="brand-box">
        <a class="brand" href="#hero">The Boss Agency Co</a>
        <div class="nav-stack">
          <a class="nav-link" href="#hero"><span>Home</span><small>01</small></a>
        </div>
      </div>

      <div class="menu-socials">
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.8A3.95 3.95 0 0 0 3.8 7.75v8.5a3.95 3.95 0 0 0 3.95 3.95h8.5a3.95 3.95 0 0 0 3.95-3.95v-8.5a3.95 3.95 0 0 0-3.95-3.95Zm8.95 1.55a1.1 1.1 0 1 1 0 2.2 1.1 1.1 0 0 1 0-2.2ZM12 6.35A5.65 5.65 0 1 1 6.35 12 5.66 5.66 0 0 1 12 6.35Zm0 1.8A3.85 3.85 0 1 0 15.85 12 3.85 3.85 0 0 0 12 8.15Z"/></svg>
        </a>
        <a href="#" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M13.5 22v-8.2h2.76l.41-3.2H13.5V8.56c0-.92.26-1.55 1.58-1.55h1.69V4.15c-.29-.04-1.28-.12-2.44-.12-2.42 0-4.08 1.48-4.08 4.2v2.37H7.5v3.2h2.75V22z"/></svg>
        </a>
        <a href="#" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M4.98 3.5A2.49 2.49 0 1 1 5 8.48 2.49 2.49 0 0 1 4.98 3.5ZM3 9h4v12H3Zm6.5 0h3.83v1.64h.05c.53-1.01 1.83-2.08 3.77-2.08 4.03 0 4.77 2.65 4.77 6.1V21h-4v-5.58c0-1.33-.02-3.03-1.85-3.03-1.85 0-2.13 1.45-2.13 2.94V21h-4Z"/></svg>
        </a>
      </div>
    </aside>

    <button class="menu-trigger" id="menuToggle" type="button" aria-expanded="false" aria-controls="sideMenu" aria-label="Toggle menu">
      <span class="menu-trigger-inner">
        <span class="menu-tab-text">THE BOSS AGENCY</span>
        <span class="menu-tab-line" aria-hidden="true"></span>
      </span>
    </button>
  </div>

  <div class="layout">
    <main class="content">
      <section class="hero" id="hero">
        <div class="hero-inner">
          <div class="hero-topbar">
            <div class="hero-mark"><span>SESSIONS</span></div>

            <div class="hero-actions-top">
              <button class="hero-menu-pill" type="button" id="heroMenuButton">Menu</button>
              <button class="hero-menu-circle" type="button" aria-label="Open menu" id="heroCircleButton">▼</button>
            </div>
          </div>

          <div class="hero-center">
            <div class="hero-copy">
              <h1 class="hero-editorial-title">
                <span class="line">
                  <span>WE TURN LOVED FOOD</span>
                  <span class="hero-image-card top-card">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80" alt="Featured burger" />
                  </span>
                </span>

                <span class="line">
                  <span>BRANDS</span>
                  <span class="hero-chip-dark">
                    <span class="hero-chip-brand">
                      <span>LITTLE<br>BAD BOY</span>
                      <strong>BANG</strong>
                    </span>
                  </span>
                  <span>INTO</span>
                </span>

                <span class="line">
                  <span class="hero-image-card bottom-card">
                    <img src="https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=900&q=80" alt="Featured bowl" />
                  </span>
                  <span>NATIONAL FRANCHISES</span>
                </span>
              </h1>

              <p class="hero-editorial-sub">
                We build standout brands, websites, strategy, and digital presence for businesses that want sharper positioning and a stronger first impression.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const heroMenuButton = document.getElementById('heroMenuButton');
    const heroCircleButton = document.getElementById('heroCircleButton');

    function toggleMenu(){
      document.body.classList.toggle('menu-open');
      const expanded = document.body.classList.contains('menu-open');
      menuToggle.setAttribute('aria-expanded', expanded);
    }

    menuToggle.addEventListener('click', toggleMenu);
    heroMenuButton.addEventListener('click', toggleMenu);
    heroCircleButton.addEventListener('click', toggleMenu);
  </script>
</body>
</html>
