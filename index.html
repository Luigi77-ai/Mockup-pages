<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessions Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #ffffff;
      color: #000000;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      font: inherit;
    }

    .page {
      min-height: 100vh;
      width: 100%;
      padding: 24px 18px 40px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      width: 100%;
    }

    .logo {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 5vw, 5.4rem);
      line-height: 0.88;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
    }

    .logo-ring {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.92em;
      height: 0.92em;
      border: 0.085em solid #000;
      border-radius: 50%;
      margin-left: 0.03em;
      transform: translateY(0.01em);
      font-size: 0.88em;
      line-height: 1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-top: 4px;
    }

    .menu-btn {
      width: 88px;
      height: 70px;
      border-radius: 18px;
      background: #000;
      color: #fff;
      font-family: 'Anton', sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropdown-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      line-height: 1;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 20px;
      padding-bottom: 30px;
    }

    .hero-inner {
      width: 100%;
      max-width: 890px;
      display: flex;
      justify-content: center;
    }

    .headline {
      font-family: 'Anton', sans-serif;
      text-transform: uppercase;
      color: #000;
      font-size: clamp(3rem, 6.4vw, 6.4rem);
      line-height: 0.9;
      letter-spacing: 0.5px;
      width: 100%;
      max-width: 880px;
    }

    .line {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .line + .line {
      margin-top: 14px;
    }

    .word {
      display: inline-block;
    }

    .card {
      overflow: hidden;
      border-radius: 8px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .burger-card {
      width: 156px;
      height: 82px;
      background: #111;
    }

    .bowl-card {
      width: 126px;
      height: 76px;
      background: #111;
    }

    .brand-card {
      width: 410px;
      height: 74px;
      background: #1d1d1d;
      color: #fff;
      padding: 0 20px;
      justify-content: space-between;
      gap: 14px;
    }

    .brand-card-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border: 2px solid #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Anton', sans-serif;
      font-size: 0.82rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 0.95;
      min-width: 0;
    }

    .brand-copy strong {
      font-size: 1.22rem;
      font-family: 'Anton', sans-serif;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .brand-copy span {
      font-size: 0.62rem;
      font-family: Arial, sans-serif;
      margin-top: 3px;
      letter-spacing: 0.3px;
      opacity: 0.95;
    }

    .brand-right {
      font-family: 'Anton', sans-serif;
      font-size: 1.7rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .mobile-menu {
      position: absolute;
      top: 112px;
      right: 18px;
      width: 220px;
      background: #000;
      color: #fff;
      border-radius: 20px;
      padding: 18px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 20;
    }

    .mobile-menu a {
      font-family: 'Anton', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .mobile-menu.show {
      display: flex;
    }

    @media (max-width: 1100px) {
      .headline {
        font-size: clamp(2.8rem, 7vw, 5.6rem);
      }

      .brand-card {
        width: 360px;
      }
    }

    @media (max-width: 820px) {
      .page {
        padding: 18px 14px 28px;
      }

      .header {
        align-items: center;
      }

      .logo {
        font-size: 3.2rem;
      }

      .header-actions {
        gap: 10px;
      }

      .menu-btn {
        width: 74px;
        height: 58px;
        border-radius: 16px;
        font-size: 0.95rem;
      }

      .dropdown-btn {
        width: 58px;
        height: 58px;
        font-size: 1.2rem;
      }

      .hero {
        align-items: center;
        justify-content: flex-start;
      }

      .hero-inner {
        justify-content: flex-start;
      }

      .headline {
        font-size: clamp(2.4rem, 11vw, 4.5rem);
        line-height: 0.92;
      }

      .line {
        gap: 10px;
        flex-wrap: wrap;
        white-space: normal;
      }

      .line + .line {
        margin-top: 10px;
      }

      .burger-card {
        width: 120px;
        height: 66px;
      }

      .bowl-card {
        width: 100px;
        height: 62px;
      }

      .brand-card {
        width: 100%;
        max-width: 340px;
        height: 62px;
        padding: 0 14px;
      }

      .brand-icon {
        width: 34px;
        height: 34px;
        font-size: 0.68rem;
      }

      .brand-copy strong {
        font-size: 0.98rem;
      }

      .brand-copy span {
        font-size: 0.52rem;
      }

      .brand-right {
        font-size: 1.28rem;
      }

      .mobile-menu {
        top: 90px;
        right: 14px;
      }
    }

    @media (max-width: 560px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .header-actions {
        align-self: flex-end;
      }

      .logo {
        font-size: 2.8rem;
      }

      .headline {
        font-size: clamp(2.1rem, 14vw, 3.8rem);
      }

      .brand-card {
        max-width: 100%;
      }

      .mobile-menu {
        width: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <a href="#home" class="logo" aria-label="Sessions">
        SESSION<span class="logo-ring">S</span>
      </a>

      <div class="header-actions">
        <button class="menu-btn" id="menuToggle" aria-label="Open menu">Menu</button>
        <button class="dropdown-btn" id="menuCircle" aria-label="Toggle menu">▼</button>
      </div>

      <nav class="mobile-menu" id="mobileMenu">
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main class="hero" id="home">
      <div class="hero-inner">
        <section class="headline">
          <div class="line">
            <span class="word">We Turn Loved Food</span>

            <div class="card burger-card">
              <img
                src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80"
                alt="Burger"
                loading="lazy"
              />
            </div>
          </div>

          <div class="line">
            <span class="word">Brands</span>

            <div class="card brand-card">
              <div class="brand-card-left">
                <div class="brand-icon">LB</div>

                <div class="brand-copy">
                  <strong>LITTLE BAO BOY</strong>
                  <span>北方包子男孩</span>
                </div>
              </div>

              <div class="brand-right">BANG</div>
            </div>

            <span class="word">Into</span>
          </div>

          <div class="line">
            <div class="card bowl-card">
              <img
                src="https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=800&q=80"
                alt="Bowl of food"
                loading="lazy"
              />
            </div>

            <span class="word">National Franchises</span>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const menuToggle = document.getElementById("menuToggle");
    const menuCircle = document.getElementById("menuCircle");
    const mobileMenu = document.getElementById("mobileMenu");

    function toggleMenu() {
      mobileMenu.classList.toggle("show");
    }

    menuToggle.addEventListener("click", toggleMenu);
    menuCircle.addEventListener("click", toggleMenu);

    document.querySelectorAll(".mobile-menu a").forEach(link => {
      link.addEventListener("click", () => {
        mobileMenu.classList.remove("show");
      });
    });

    document.addEventListener("click", (e) => {
      const insideMenu = mobileMenu.contains(e.target);
      const clickedButton = menuToggle.contains(e.target) || menuCircle.contains(e.target);

      if (!insideMenu && !clickedButton) {
        mobileMenu.classList.remove("show");
      }
    });
  </script>
</body>
</html>
