<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VA Recruitment Agency</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11121a;
      font-family: Arial, Helvetica, sans-serif;
    }

    .va-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 40px 24px;
    }

    .balloon-text-image {
      display: block;
      width: 100%;
      max-width: 640px;
      height: auto;
      margin-bottom: -18px;
    }

    .view-more-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 38px;
      border-radius: 999px;
      text-decoration: none;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3a2a08;
      background: linear-gradient(180deg, #fff3c4 0%, #f6cf5b 22%, #e0a92b 55%, #c4860f 78%, #a76b06 100%);
      box-shadow:
        0 10px 22px rgba(180, 120, 10, 0.35),
        inset 0 2px 2px rgba(255, 255, 255, 0.85),
        inset 0 -6px 10px rgba(120, 70, 0, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .view-more-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 14px 28px rgba(180, 120, 10, 0.4),
        inset 0 2px 2px rgba(255, 255, 255, 0.9),
        inset 0 -6px 10px rgba(120, 70, 0, 0.35);
    }

    .view-more-btn:active {
      transform: translateY(0);
    }

    .view-more-btn svg {
      width: 14px;
      height: 14px;
      stroke: #3a2a08;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s ease;
    }

    .view-more-btn:hover svg {
      transform: translateX(3px);
    }

    @media (max-width: 600px) {
      .balloon-text-image {
        max-width: 90vw;
      }

      .view-more-btn {
        font-size: 13px;
        padding: 14px 30px;
      }
    }
  </style>
</head>
<body>

  <div class="va-block">
    <img
      src="assets/WhatsApp Image 2026-06-19 at 4.28.44 PM.jpeg"
      alt="VA Recruitment Agency"
      class="balloon-text-image"
      loading="eager"
    />

    <a class="view-more-btn" href="#" target="_blank" rel="noopener">
      View more
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 12h14"></path>
        <path d="M13 5l7 7-7 7"></path>
      </svg>
    </a>
  </div>

</body>
</html>
