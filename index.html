<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Recruitment Agency Button</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Anton&display=swap" rel="stylesheet">

  <style>
    :root {
      --color-dark: #1f1830;
      --color-light: #ffffff;
      --color-primary: #c579ff;
      --color-pink: #ffb7df;
      --color-gold: #ffe89a;
      --color-blue: #b8f3ff;
      --animation-primary: 0.4s cubic-bezier(0.5, 0.75, 0, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.75) 0%, rgba(255,255,255,0) 28%),
        radial-gradient(circle at 80% 15%, rgba(255,205,240,0.55) 0%, rgba(255,205,240,0) 26%),
        radial-gradient(circle at 50% 100%, rgba(197,121,255,0.18) 0%, rgba(197,121,255,0) 35%),
        linear-gradient(180deg, #f3e6ff 0%, #ffe79c 100%);
    }

    .btn-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-decoration: none;
      transition: transform var(--animation-primary), box-shadow var(--animation-primary);
      -webkit-tap-highlight-color: transparent;
      isolation: isolate;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
    }

    .btn .btn-background {
      position: absolute;
      inset: 0;
      transform: translateY(101%) rotate(0.001deg);
      border-radius: 50% 50% 0 0;
      transition: all var(--animation-primary);
      z-index: 1;
      background:
        linear-gradient(
          135deg,
          #fff8ff 0%,
          #ffd7ef 14%,
          #c97cff 32%,
          #bff3ff 50%,
          #ffe99b 68%,
          #ffbfe8 84%,
          #ffffff 100%
        );
      background-size: 200% 200%;
      animation: holoFlow 7s ease-in-out infinite;
    }

    .btn:hover .btn-background {
      transform: translateY(0%) rotate(0.001deg);
      border-radius: 0;
    }

    .btn .btn-text {
      position: relative;
      z-index: 3;
      transform: translateY(0%) rotate(0.001deg);
      transition: all var(--animation-primary);
      white-space: nowrap;
    }

    .btn:hover .btn-text {
      transform: translateY(-101%) rotate(0.001deg);
    }

    .btn .btn-text.duplicate {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(150%) rotate(0.001deg);
      pointer-events: none;
    }

    .btn:hover .btn-text.duplicate {
      transform: translateY(0%) rotate(0.001deg);
    }

    .btn-border {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.5px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.95) 0%,
          rgba(255,220,242,0.95) 18%,
          rgba(207,142,255,0.95) 38%,
          rgba(192,245,255,0.95) 56%,
          rgba(255,237,166,0.98) 74%,
          rgba(255,189,232,0.95) 100%
        );
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 4;
      pointer-events: none;
      opacity: 0.95;
    }

    .btn.filled {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(248,233,255,0.88) 26%, rgba(238,208,255,0.9) 100%);
      border-radius: 999px;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.95),
        inset 0 -10px 16px rgba(170,116,255,0.18),
        0 14px 34px rgba(145,84,214,0.22),
        0 5px 14px rgba(255,182,222,0.24);
    }

    .btn.filled::before {
      content: "";
      position: absolute;
      inset: 3px 10px auto 10px;
      height: 46%;
      border-radius: 999px;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.98) 0%,
          rgba(255,255,255,0.72) 35%,
          rgba(255,255,255,0.18) 72%,
          rgba(255,255,255,0) 100%
        );
      z-index: 2;
      pointer-events: none;
      filter: blur(0.2px);
    }

    .btn.filled::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: -10px;
      height: 26px;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(193,122,255,0.28) 0%, rgba(193,122,255,0) 72%);
      filter: blur(12px);
      z-index: 0;
      pointer-events: none;
    }

    .btn.filled .btn-text {
      font-family: 'Anton', sans-serif;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: transparent;
      background:
        linear-gradient(
          135deg,
          #ffffff 0%,
          #ffe2f4 14%,
          #d79eff 32%,
          #c8f8ff 50%,
          #fff0ae 68%,
          #ffc8eb 84%,
          #ffffff 100%
        );
      background-size: 220% 220%;
      -webkit-background-clip: text;
      background-clip: text;
      animation: holoFlow 8s ease-in-out infinite;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.92),
        0 2px 0 rgba(242,203,255,0.9),
        0 3px 0 rgba(224,172,255,0.78),
        0 4px 0 rgba(198,144,250,0.62),
        0 8px 18px rgba(173,109,255,0.28),
        0 12px 26px rgba(255,153,220,0.18);
      filter: saturate(1.15) contrast(1.05);
    }

    .hero-btn {
      min-width: 435px;
      height: 78px;
      padding: 0 40px;
      border-radius: 999px;
    }

    @keyframes holoFlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @media (max-width: 600px) {
      .hero-btn {
        min-width: min(100%, 360px);
        width: min(100%, 360px);
        height: 68px;
        padding: 0 24px;
      }

      .btn.filled .btn-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="btn-wrap">
    <a href="#" class="btn filled hero-btn">
      <div class="btn-background"></div>
      <span class="btn-text">VA RECRUITMENT AGENCY</span>
      <span class="btn-text duplicate">VA RECRUITMENT AGENCY</span>
      <div class="btn-border"></div>
    </a>
  </div>
</body>
</html>
