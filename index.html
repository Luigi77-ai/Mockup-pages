<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VA Recruitment Agency</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #11121a;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .hero-button-section {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .image-button {
      position: relative;
      display: inline-block;
      text-decoration: none;
      border-radius: 28px;
      outline: none;
      animation: floatButton 3.6s ease-in-out infinite;
      transform-origin: center center;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .image-button:focus-visible {
      box-shadow: 0 0 0 4px rgba(255, 215, 102, 0.45);
      border-radius: 28px;
    }

    .image-button:hover {
      transform: translateY(-6px) rotate(-1deg) scale(1.02);
      filter: brightness(1.03);
      animation-play-state: paused;
    }

    .image-button:active {
      transform: translateY(-1px) scale(0.99);
    }

    .image-button::before {
      content: "";
      position: absolute;
      inset: -10px -16px -18px -16px;
      background: radial-gradient(circle at center, rgba(255, 196, 72, 0.22) 0%, rgba(255, 196, 72, 0) 72%);
      filter: blur(18px);
      z-index: 0;
      pointer-events: none;
      animation: glowPulse 3.6s ease-in-out infinite;
    }

    .image-button::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 34%);
      pointer-events: none;
      z-index: 2;
    }

    .balloon-text-image {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      max-width: 640px;
      height: auto;
      filter:
        drop-shadow(0 18px 30px rgba(0, 0, 0, 0.35))
        drop-shadow(0 8px 12px rgba(255, 187, 0, 0.08));
      will-change: transform;
    }

    @keyframes floatButton {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      25% {
        transform: translateY(-8px) rotate(-1deg);
      }
      50% {
        transform: translateY(-2px) rotate(1deg);
      }
      75% {
        transform: translateY(-10px) rotate(-0.6deg);
      }
      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    @keyframes glowPulse {
      0% {
        opacity: 0.55;
        transform: scale(0.98);
      }
      50% {
        opacity: 0.9;
        transform: scale(1.04);
      }
      100% {
        opacity: 0.55;
        transform: scale(0.98);
      }
    }

    @media (max-width: 600px) {
      .balloon-text-image {
        max-width: 92vw;
      }

      .image-button {
        border-radius: 22px;
      }

      .image-button::after {
        border-radius: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .image-button,
      .image-button::before {
        animation: none;
      }

      .image-button:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>

  <section class="hero-button-section">
    <a class="image-button" href="next-page.html" aria-label="Go to next page">
      <img
        src="assets/WhatsApp Image 2026-06-19 at 4.28.44 PM.jpeg"
        alt="VA Recruitment Agency"
        class="balloon-text-image"
        loading="eager"
      />
    </a>
  </section>

</body>
</html>
