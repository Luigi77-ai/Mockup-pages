<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VA Recruitment Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #ffffff;
  }

  .va-hero {
    width: 100%;
    min-height: 100vh;
    padding: 34px 20px 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      linear-gradient(180deg, #e8dce5 0%, #f3e3d6 38%, #f7e7b0 100%);
    overflow: hidden;
  }

  .va-wrap {
    width: 100%;
    max-width: 1220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .va-topline {
    font-size: clamp(1.6rem, 3vw, 4rem);
    line-height: 1.05;
    font-weight: 500;
    color: #1f1d23;
    text-align: center;
    margin: 0 0 26px;
    letter-spacing: -0.04em;
  }

  .va-stage {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 34px;
    padding: 10px 0 24px;
  }

  .va-word-art {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transform: rotate(-1deg);
  }

  .va-line {
    margin: 0;
    text-align: center;
    text-transform: lowercase;
    font-weight: 900;
    line-height: 0.82;
    letter-spacing: -0.08em;
    position: relative;
    color: transparent;
    background:
      linear-gradient(
        180deg,
        #f7b8ff 0%,
        #e985ff 10%,
        #c94bff 24%,
        #9c20ff 42%,
        #7f12ff 58%,
        #5a00cc 74%,
        #21005d 100%
      );
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 10px 0 rgba(36, 0, 92, 0.9))
            drop-shadow(0 22px 16px rgba(48, 0, 122, 0.28));
    -webkit-text-stroke: 2px rgba(255,255,255,0.18);
  }

  .va-line::before {
    content: attr(data-text);
    position: absolute;
    left: 0.035em;
    top: 0.16em;
    z-index: -1;
    color: rgba(26, 0, 76, 0.98);
    -webkit-text-stroke: 0 transparent;
    filter: blur(0.4px);
  }

  .va-line::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    background:
      linear-gradient(
        180deg,
        rgba(255,255,255,0.95) 0%,
        rgba(255,255,255,0.42) 14%,
        rgba(255,255,255,0) 32%
      );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  .va-line-top {
    font-size: clamp(4.4rem, 12vw, 10rem);
  }

  .va-line-bottom {
    font-size: clamp(3rem, 8.1vw, 6.9rem);
  }

  .va-star {
    position: absolute;
    width: clamp(80px, 10vw, 126px);
    height: auto;
    color: #d9d9df;
    filter:
      drop-shadow(0 5px 4px rgba(255,255,255,0.55))
      drop-shadow(0 10px 10px rgba(0,0,0,0.16));
  }

  .va-star.left {
    left: 2%;
    top: 42%;
    transform: translateY(-50%) rotate(-10deg);
  }

  .va-star.right {
    right: 5%;
    top: 24%;
    transform: translateY(-50%) rotate(8deg);
  }

  .va-cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 54px;
    padding: 0 26px;
    border-radius: 999px;
    background: #23222b;
    color: #ffffff;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    text-decoration: none;
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }

  .va-cta:hover {
    transform: translateY(-1px);
  }

  @media (max-width: 900px) {
    .va-stage {
      margin-bottom: 28px;
      padding-bottom: 10px;
    }

    .va-star.left {
      left: -1%;
      top: 48%;
    }

    .va-star.right {
      right: 1%;
      top: 19%;
    }
  }

  @media (max-width: 640px) {
    .va-hero {
      min-height: auto;
      padding: 34px 14px 40px;
    }

    .va-topline {
      font-size: clamp(1.2rem, 7vw, 2.2rem);
      margin-bottom: 18px;
    }

    .va-stage {
      margin-bottom: 22px;
      padding-top: 8px;
    }

    .va-word-art {
      gap: 6px;
    }

    .va-line {
      -webkit-text-stroke: 1.2px rgba(255,255,255,0.16);
      filter: drop-shadow(0 6px 0 rgba(36, 0, 92, 0.9))
              drop-shadow(0 14px 10px rgba(48, 0, 122, 0.22));
    }

    .va-line::before {
      left: 0.03em;
      top: 0.13em;
    }

    .va-line-top {
      font-size: clamp(3.3rem, 16vw, 5.4rem);
    }

    .va-line-bottom {
      font-size: clamp(2.05rem, 10vw, 3.4rem);
    }

    .va-star {
      width: 58px;
    }

    .va-star.left {
      left: -4px;
      top: 50%;
    }

    .va-star.right {
      right: 0;
      top: 16%;
    }

    .va-cta {
      min-height: 50px;
      padding: 0 22px;
      font-size: 0.95rem;
    }
  }
</style>
</head>
<body>

<section class="va-hero">
  <div class="va-wrap">
    <h2 class="va-topline">Help us build stronger teams with</h2>

    <div class="va-stage">
      <svg class="va-star left" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M60 4C63 38 69 51 116 60C69 69 63 82 60 116C57 82 51 69 4 60C51 51 57 38 60 4Z" fill="url(#silverA)"/>
        <defs>
          <linearGradient id="silverA" x1="4" y1="4" x2="116" y2="116" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8D8E96"/>
            <stop offset="0.2" stop-color="#FFFFFF"/>
            <stop offset="0.45" stop-color="#A8A9B1"/>
            <stop offset="0.68" stop-color="#F5F5F8"/>
            <stop offset="1" stop-color="#7F8088"/>
          </linearGradient>
        </defs>
      </svg>

      <div class="va-word-art">
        <h1 class="va-line va-line-top" data-text="va">va</h1>
        <h1 class="va-line va-line-bottom" data-text="recruitment agency">recruitment agency</h1>
      </div>

      <svg class="va-star right" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M60 4C63 38 69 51 116 60C69 69 63 82 60 116C57 82 51 69 4 60C51 51 57 38 60 4Z" fill="url(#silverB)"/>
        <defs>
          <linearGradient id="silverB" x1="4" y1="4" x2="116" y2="116" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8D8E96"/>
            <stop offset="0.2" stop-color="#FFFFFF"/>
            <stop offset="0.45" stop-color="#A8A9B1"/>
            <stop offset="0.68" stop-color="#F5F5F8"/>
            <stop offset="1" stop-color="#7F8088"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <a href="#" class="va-cta">Join our VA team</a>
  </div>
</section>

</body>
</html>
