<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Boss Agency Co | Creative Growth Studio</title>
  <meta
    name="description"
    content="The Boss Agency Co helps businesses grow through branding, web development, social media strategy, Google My Business optimization, and data-driven marketing solutions."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root{
      --bg:#ffffff;
      --paper:#ffffff;
      --card:#ffffff;
      --text:#16110d;
      --muted:#5f5246;
      --border:rgba(0,48,73,.14);
      --brand-navy:#003049;
      --brand-red:#D62828;
      --brand-orange:#E07A2F;
      --brand-orange-deep:#E07A2F;
      --brand-orange-soft:#E07A2F;
      --brand-yellow:#DCC46D;
      --brand-yellow-soft:#DCC46D;
      --brand-yellow-deep:#CDB55E;
      --brand-cream:#ffffff;
      --brand-blue-panel:#0d3f63;
      --brand-blue-deep:#08395c;
      --brand-blue-soft:#174f78;
      --dark:#16110d;
      --white:#ffffff;
      --radius:6px;
      --menu-rail-width:88px;
      --sidebar-width:300px;
      --menu-total-width:calc(var(--menu-rail-width) + var(--sidebar-width));
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Be Vietnam Pro",sans-serif;
      color:var(--text);
      background:#ffffff;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    button,input,select,textarea{font:inherit}
    .menu-shell{
      position:fixed;top:0;left:0;
      width:var(--menu-total-width);height:100vh;
      z-index:60;display:flex;
      transform:translateX(calc(-1 * var(--sidebar-width)));
      transition:transform .34s ease;
    }
    body.menu-open .menu-shell{transform:translateX(0)}
    .menu-trigger{
      width:var(--menu-rail-width);height:100vh;
      border:none;background:var(--brand-orange);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      padding:0;flex:0 0 auto;position:relative;z-index:2;
    }
    .menu-trigger-inner{
      width:100%;height:100%;
      display:flex;align-items:center;justify-content:center;
      gap:12px;padding:20px 0;background:transparent;
    }
    .menu-tab-text{
      writing-mode:vertical-rl;transform:rotate(180deg);
      font-size:22px;line-height:.92;letter-spacing:.10em;
      text-transform:uppercase;font-weight:800;color:#ffffff;
      user-select:none;white-space:nowrap;
    }
    .menu-tab-line{width:4px;height:250px;border-radius:999px;background:#ffffff;flex:0 0 auto}
    .menu-panel{
      width:var(--sidebar-width);height:100vh;padding:18px;
      background:var(--brand-orange);border-right:1px solid rgba(255,255,255,.12);
      display:flex;flex-direction:column;gap:12px;flex:0 0 auto;justify-content:space-between;
    }
    .brand-box{
      border-radius:16px;overflow:hidden;background:rgba(255,255,255,.16);
      color:#ffffff;padding:14px 14px 18px;border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(10px);
    }
    .brand{display:inline-block;font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
    .nav-stack{display:grid;gap:10px;margin-top:12px}
    .nav-link{
      display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px;
      background:rgba(255,255,255,.14);border-radius:14px;color:#ffffff;
      font-size:14px;font-weight:700;transition:transform .2s ease,background .2s ease;
      border:1px solid rgba(255,255,255,.12);
    }
    .nav-link:hover{transform:translateY(-1px);background:rgba(255,255,255,.22)}
    .nav-link small{
      width:28px;height:28px;border-radius:999px;display:grid;place-items:center;
      background:#ffffff;font-size:12px;font-weight:800;color:var(--brand-orange);
      border:1px solid rgba(255,255,255,.10);
    }
    .menu-socials{
      display:flex;justify-content:center;gap:12px;padding:4px 0 10px;flex-wrap:wrap;
    }
    .menu-socials a{
      width:42px;height:42px;display:grid;place-items:center;border-radius:999px;
      background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.14);
      color:#ffffff;transition:transform .2s ease,background .2s ease,color .2s ease;
    }
    .menu-socials a:hover{transform:translateY(-2px);background:#ffffff;color:var(--brand-orange)}
    .menu-socials svg{width:18px;height:18px;fill:currentColor}
    .layout{
      min-height:100vh;position:relative;z-index:1;
      margin-left:var(--menu-rail-width);transition:margin-left .34s ease;background:#ffffff;
    }
    body.menu-open .layout{margin-left:var(--menu-total-width)}
    .content{padding:24px;position:relative;background:#ffffff}

    /* ── HERO ── */
    .hero{min-height:auto;padding:24px 0 0;text-align:center;background:#ffffff;overflow:hidden;position:relative;isolation:isolate}
    .hero-inner{max-width:1280px;margin:0 auto;padding:0;position:relative;z-index:1}
    .hero-copy{width:100%;max-width:980px;margin:0 auto;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
    .hero-copy h1{margin:0;font-size:clamp(2.5rem,5.8vw,5.4rem);line-height:.94;letter-spacing:-.06em;max-width:none;color:var(--brand-navy)}
    .hero-copy p{margin:16px 0 0;max-width:66ch;color:var(--muted);font-size:16px;line-height:1.75}
    .hero-showcase{margin:8px auto 0;width:100%;max-width:1240px;height:320px;position:relative;display:block;overflow:hidden}
    .hero-ribbon{position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);width:min(1120px,95%);height:360px;overflow:hidden}
    .hero-sweep{position:absolute;bottom:-110px;border-radius:260px 260px 34px 34px;transform-origin:bottom center}
    .hero-sweep.s1{left:4%;width:15%;height:210px;background:linear-gradient(180deg,#8E002A,#B50036);transform:rotate(-14deg);z-index:2}
    .hero-sweep.s2{left:15%;width:14%;height:250px;background:linear-gradient(180deg,#F36B00,#F77F00);transform:rotate(-9deg);z-index:3}
    .hero-sweep.s3{left:27%;width:14%;height:295px;background:linear-gradient(180deg,#F6C51C,#FCBF49);transform:rotate(-4deg);z-index:4}
    .hero-sweep.s4{left:40%;width:12%;height:350px;background:linear-gradient(180deg,#4340D5,#5A54EA);transform:rotate(0deg);z-index:5}
    .hero-sweep.s5{left:52%;width:13%;height:312px;background:linear-gradient(180deg,#51C7EB,#6ADCF8);transform:rotate(5deg);z-index:4}
    .hero-sweep.s6{left:64%;width:14%;height:268px;background:linear-gradient(180deg,#64E3B0,#7AEEBE);transform:rotate(10deg);z-index:3}
    .hero-sweep.s7{left:76%;width:17%;height:225px;background:linear-gradient(180deg,#D7F03A,#E7F75C);transform:rotate(7deg);z-index:2}

    /* ── SECTION BASE ── */
    .section{padding:84px 0;position:relative;background:#ffffff}
    .section-title{margin:0 0 28px;text-align:center;font-size:clamp(2rem,4vw,3.4rem);line-height:1;letter-spacing:-.04em;color:var(--brand-navy)}

    /* ── SERVICES ── */
    .services-section{padding:72px 24px 38px;margin-left:-24px;margin-right:-24px;background:var(--brand-yellow);overflow:hidden}
    .services-shell{display:grid;grid-template-columns:minmax(320px,390px) minmax(360px,1fr);gap:2px;align-items:center;max-width:1040px;margin:0 auto}
    .services-visual{position:relative;min-height:420px;display:flex;align-items:flex-end;justify-content:flex-start}
    .services-photo-stage{position:relative;width:100%;max-width:350px;height:390px;margin-left:-6px}
    .services-blob-yellow{position:absolute;left:28px;bottom:74px;width:220px;height:220px;background:#CDB55E;border-radius:220px 220px 36px 36px;z-index:1}
    .services-dot-grid{position:absolute;left:24px;bottom:18px;width:130px;height:96px;background-image:radial-gradient(rgba(255,255,255,.55) 1.1px,transparent 1.1px);background-size:8px 8px;opacity:.48;z-index:1}
    .services-photo-card{position:absolute;left:56px;bottom:0;width:214px;height:286px;border-radius:150px 150px 22px 22px;overflow:hidden;z-index:3;box-shadow:0 18px 34px rgba(0,48,73,.12);background:#d9cbb4;transition:transform .35s ease,box-shadow .35s ease}
    .services-photo-card img{width:100%;height:100%;object-fit:cover;object-position:center top}
    .services-mini-badge{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:999px;background:#fff;box-shadow:0 10px 24px rgba(0,0,0,.08);z-index:4}
    .services-mini-badge.one{top:40px;left:66px;width:40px;height:40px;font-size:18px;transform:rotate(-8deg)}
    .services-mini-badge.two{top:6px;left:120px;width:48px;height:48px;font-size:23px;transform:rotate(8deg)}
    .services-mini-badge.three{top:90px;left:10px;width:52px;height:52px;font-size:26px;background:var(--brand-orange);color:#fff;border:3px solid #fff}
    .services-mini-badge.four{top:78px;left:246px;width:44px;height:44px;font-size:22px;transform:rotate(8deg)}
    .services-mini-badge.five{top:176px;left:6px;width:38px;height:38px;font-size:18px;transform:rotate(-10deg)}
    .services-mini-badge.six{top:182px;left:252px;width:40px;height:40px;font-size:18px;transform:rotate(8deg)}
    .services-spark{position:absolute;z-index:4;color:#ffffff;font-size:26px;line-height:1;opacity:.9}
    .services-spark.one{top:40px;left:222px}
    .services-spark.two{top:148px;left:46px;font-size:24px}
    .services-spark.three{top:130px;left:212px;font-size:22px}
    .services-content{display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;min-height:420px;text-align:left;position:relative;padding-top:0;padding-left:0}
    .services-tabs{position:absolute;top:0;right:-180px;display:flex;flex-direction:column;gap:18px;margin:0;width:auto;justify-content:flex-start;align-items:flex-end;z-index:4}
    .service-tab{min-width:120px;background:transparent;border:none;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#ffffff;font-weight:800;font-size:16px;line-height:1.15;letter-spacing:.01em;cursor:pointer;text-align:center;transition:transform .22s ease,color .22s ease,filter .22s ease,opacity .22s ease}
    .service-tab svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;transition:transform .22s ease}
    .service-tab.active{transform:translateX(-4px);filter:drop-shadow(0 10px 18px rgba(0,0,0,.08))}
    .service-tab:hover{transform:translateX(-5px);filter:drop-shadow(0 10px 18px rgba(0,0,0,.08))}
    .service-tab:hover svg,.service-tab.active svg{transform:scale(1.08)}
    .services-panel{width:100%;max-width:690px;position:relative;min-height:390px;padding-right:220px}
    .service-view{position:absolute;inset:0;display:grid;grid-template-columns:minmax(250px,1fr) minmax(220px,280px);gap:22px;align-items:center;opacity:0;pointer-events:none;transform:translateX(80px);transition:opacity .45s ease,transform .45s cubic-bezier(.22,1,.36,1)}
    .service-view.active{opacity:1;pointer-events:auto;transform:translateX(0);z-index:2}
    .service-copy{text-align:left}
    .services-word{margin:0 0 12px;font-size:clamp(1.85rem,3vw,2.6rem);line-height:.95;letter-spacing:-.06em;text-transform:uppercase;color:var(--brand-red);width:100%}
    .service-copy h3{margin:0 0 12px;font-size:clamp(1.35rem,2.4vw,2rem);line-height:1;letter-spacing:-.05em;color:var(--brand-navy);max-width:13ch}
    .service-copy p{margin:0 0 18px;color:#4f453b;font-size:.97rem;line-height:1.75;max-width:32rem}
    .service-bullets{display:grid;gap:10px;margin:0}
    .service-bullets span{display:flex;align-items:center;gap:10px;color:var(--brand-navy);font-size:14px;font-weight:700;letter-spacing:.01em}
    .service-bullets span::before{content:"";width:10px;height:10px;border-radius:999px;background:currentColor;flex:0 0 auto}
    .service-media{position:relative;height:320px;display:flex;align-items:flex-end;justify-content:center}
    .service-media-shape{position:absolute;left:18px;bottom:52px;width:160px;height:160px;border-radius:180px 180px 28px 28px;background:var(--media-accent,#ffffff);z-index:1}
    .service-media-dots{position:absolute;left:10px;bottom:8px;width:126px;height:84px;background-image:radial-gradient(rgba(255,255,255,.45) 1.1px,transparent 1.1px);background-size:8px 8px;opacity:.55;z-index:1}
    .service-media-card{position:absolute;left:40px;bottom:0;width:192px;height:264px;border-radius:132px 132px 20px 20px;overflow:hidden;box-shadow:0 18px 34px rgba(0,48,73,.12);background:#d7c8b5;z-index:3}
    .service-media-card img{width:100%;height:100%;object-fit:cover;object-position:center}
    .service-media-icon{position:absolute;top:16px;right:18px;width:54px;height:54px;border-radius:999px;display:grid;place-items:center;background:#fff;box-shadow:0 10px 24px rgba(0,0,0,.08);z-index:4;color:var(--media-icon,var(--brand-navy))}
    .service-media-icon svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

    /* ── PROJECTS ── */
    .projects-band{position:relative;margin:40px 0 24px;padding:34px 26px 34px;border-radius:34px;overflow:visible;isolation:isolate}
    .projects-band::before,.projects-band::after{content:none}
    .projects-stage{padding:24px 12px 24px}
    .project-grid{display:grid;grid-template-columns:0.94fr 0.8fr 0.8fr;grid-template-areas:"a b c" "a d e";gap:14px;max-width:920px;margin:0 auto}
    .project-card{position:relative;min-height:220px;border-radius:28px;padding:4px;overflow:hidden;background:linear-gradient(135deg,#D62828 0%,#F77F00 33%,#FCBF49 66%,#003049 100%)}
    .project-card::before{content:"";position:absolute;inset:4px;border-radius:24px;background:#ffffff;z-index:1}
    .project-card img{position:relative;z-index:2;width:100%;height:100%;object-fit:cover;border-radius:20px}
    .project-card.tall{grid-area:a;min-height:470px;border-radius:120px 28px 28px 28px}
    .project-card.tall::before{border-radius:116px 24px 24px 24px}
    .project-card.tall img{border-radius:112px 20px 20px 20px}
    .project-card.arch{grid-area:b;min-height:220px;border-radius:100px 100px 24px 24px}
    .project-card.arch::before{border-radius:96px 96px 20px 20px}
    .project-card.arch img{border-radius:92px 92px 16px 16px}
    .project-card.soft{grid-area:c;min-height:220px;border-radius:24px 76px 24px 76px}
    .project-card.soft::before{border-radius:20px 72px 20px 72px}
    .project-card.soft img{border-radius:16px 68px 16px 68px}
    .project-card.wide{grid-area:d;min-height:220px;border-radius:24px}
    .project-card.wide::before{border-radius:20px}
    .project-card.wide img{border-radius:16px}
    .project-card.blob{grid-area:e;min-height:220px;border-radius:28px 28px 100px 28px}
    .project-card.blob::before{border-radius:24px 24px 96px 24px}
    .project-card.blob img{border-radius:20px 20px 92px 20px}

    /* ── ABOUT ── */
    .about-zone{margin-top:34px;padding:36px 0 10px;border-top:none}
    .about-lead{max-width:22ch;margin:0 auto 24px;text-align:center;font-size:clamp(2.8rem,6vw,5.7rem);line-height:.92;letter-spacing:-.07em;color:var(--brand-navy)}
    .about-lead .accent{color:var(--brand-red)}
    .about-lead .lead-red{color:var(--brand-red)}
    .about-panel{background:transparent;border-radius:30px;padding:10px 0 0;border:none}
    .about-grid{display:grid;grid-template-columns:1.04fr .96fr;gap:26px;align-items:center}
    .about-copy-wrap{padding:10px 8px 10px 0}
    .about-panel h4{margin:0 0 10px;color:var(--brand-red);font-size:1rem;line-height:1.2}
    .about-panel h3{margin:0 0 16px;font-size:2.2rem;letter-spacing:-.04em;color:var(--brand-navy)}
    .about-panel p{margin:0 0 14px;color:var(--muted);font-size:15px;line-height:1.8;max-width:58ch}
    .about-photo{position:relative;min-height:340px;max-width:360px;margin:0 auto;border-radius:34px;padding:4px;overflow:hidden;background:linear-gradient(135deg,#003049 0%,#d62828 30%,#f77f00 62%,#fcbf49 100%);box-shadow:0 18px 34px rgba(0,48,73,.08)}
    .about-photo::before{content:"";position:absolute;inset:4px;border-radius:30px;background:#ffffff;z-index:1}
    .about-photo img{position:relative;z-index:2;width:100%;height:100%;min-height:332px;object-fit:cover;border-radius:26px}
    .cta-band{margin-top:24px;display:grid;gap:16px;align-items:center;justify-content:center;padding-top:22px;border-top:none;min-height:92px}
    .cta-button{display:inline-flex;align-items:center;justify-content:center;min-height:72px;min-width:260px;padding:0 40px;border-radius:8px;background:var(--brand-navy);color:#fff;font-weight:800;font-size:1.05rem;transition:background .2s ease,transform .2s ease}
    .cta-button:hover{background:var(--brand-red);transform:translateY(-1px)}

    /* ════════════════════════════════════════
       BLOG SECTION — ESTILO INTEGRADO
    ════════════════════════════════════════ */
    #blog {
      width: calc(100% + 48px);
      margin-left: -24px;
      margin-right: -24px;
      padding: 90px 60px 110px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    /* Palabra BLOG vertical a la derecha */
    .blog-vertical-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: clamp(2.8rem, 5vw, 5rem);
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #ffffff;
      background: var(--brand-navy);
      padding: 32px 16px;
      border-radius: 16px;
      user-select: none;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,48,73,.13);
      position: relative;
      z-index: 2;
      min-height: 200px;
    }

    /* Contenedor monitor + flechas */
    .blog-monitor-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1 1 auto;
    }

    /* Título de sección */
    .blog-section-title {
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--brand-navy);
      margin: 0 0 32px;
      text-align: center;
      line-height: 1;
    }
    .blog-section-title span { color: var(--brand-red); }

    /* Carcasa del monitor — estilo integrado con la página */
    .monitor-body {
      width: 100%;
      background: #ffffff;
      border: 2px solid rgba(0,48,73,.18);
      border-radius: 20px;
      padding: 14px 14px 0;
      box-shadow:
        0 4px 24px rgba(0,48,73,.10),
        0 1px 0 rgba(0,48,73,.06);
    }

    /* Barra superior tipo macOS */
    .monitor-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .m-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .m-dot.r { background: #ff5f57; }
    .m-dot.y { background: #febc2e; }
    .m-dot.g { background: #28c840; }
    .monitor-url {
      flex: 1;
      background: rgba(0,48,73,.06);
      border: 1px solid rgba(0,48,73,.12);
      border-radius: 6px;
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .monitor-url span { font-size: 10px; color: rgba(0,48,73,.45); font-family: monospace; }

    /* Pantalla */
    .monitor-screen {
      background: #f4f0ea;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      border: 1px solid rgba(0,48,73,.10);
    }

    /* Carrusel dentro de la pantalla */
    .screen-slides {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .slide-card {
      min-width: 100%;
      height: 100%;
      position: relative;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 9% 7% 7%;
    }
    .slide-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,48,73,0.92) 0%,
        rgba(0,48,73,0.55) 42%,
        rgba(0,48,73,0.10) 100%
      );
      z-index: 0;
    }
    .slide-content { position: relative; z-index: 1; }
    .slide-tag {
      display: inline-block;
      font-size: clamp(9px, 1.1vw, 11px);
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--brand-orange);
      border: 1px solid rgba(224,122,47,.50);
      border-radius: 4px;
      padding: 3px 10px;
      margin-bottom: 9px;
      background: rgba(224,122,47,.15);
    }
    .slide-title {
      font-size: clamp(13px, 2.3vw, 24px);
      font-weight: 800;
      color: #ffffff;
      line-height: 1.25;
      max-width: 480px;
      margin: 0 0 8px;
      letter-spacing: -.03em;
    }
    .slide-desc {
      font-size: clamp(10px, 1.2vw, 13px);
      color: rgba(255,255,255,.60);
      max-width: 380px;
      line-height: 1.55;
    }

    /* Pie del monitor (cuello + base) */
    .monitor-stand {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stand-neck {
      width: 56px;
      height: 26px;
      background: linear-gradient(to bottom, #ddd6cc, #c8c0b4);
      border-left: 1px solid rgba(0,0,0,.06);
      border-right: 1px solid rgba(0,0,0,.06);
    }
    .stand-base {
      width: 190px;
      height: 13px;
      background: linear-gradient(to bottom, #ddd6cc, #c4bdb0);
      border-radius: 0 0 12px 12px;
      border: 1px solid rgba(0,0,0,.08);
      border-top: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.10);
    }

    /* Flechas de navegación */
    .blog-arrows {
      position: absolute;
      top: 50%;
      left: -56px;
      right: -56px;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }
    .b-arrow {
      pointer-events: all;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid rgba(0,48,73,.18);
      color: var(--brand-navy);
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .22s ease;
      box-shadow: 0 4px 16px rgba(0,48,73,.10);
      flex-shrink: 0;
    }
    .b-arrow:hover {
      background: var(--brand-navy);
      border-color: var(--brand-navy);
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(0,48,73,.20);
      transform: scale(1.08);
    }

    /* Puntos indicadores */
    .blog-dots {
      display: flex;
      gap: 8px;
      margin-top: 22px;
      position: relative;
      z-index: 2;
    }
    .b-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(0,48,73,.18);
      cursor: pointer;
      transition: all .3s ease;
      border: none;
      padding: 0;
    }
    .b-dot.active {
      background: var(--brand-navy);
      box-shadow: 0 0 8px rgba(0,48,73,.35);
      width: 22px;
      border-radius: 4px;
    }

    @media (max-width: 900px) {
      #blog { flex-direction: column; padding: 60px 24px 80px; }
      .blog-vertical-label {
        writing-mode: horizontal-tb;
        transform: none;
        padding: 14px 28px;
        align-self: center;
        font-size: clamp(2rem, 6vw, 3rem);
        border-radius: 14px;
        min-height: auto;
      }
    }
    @media (max-width: 780px) {
      .blog-arrows { left: -32px; right: -32px; }
      .b-arrow { width: 36px; height: 36px; font-size: 16px; }
      .stand-base { width: 130px; }
    }
    @media (max-width: 500px) {
      .blog-arrows { left: -20px; right: -20px; }
    }
    /* ════════ FIN BLOG ════════ */
