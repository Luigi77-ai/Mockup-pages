<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TBA Section</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .tba-feature-section {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 72px 24px;
      background: #ffffff;
      overflow: hidden;
    }

    .tba-feature-inner {
      width: 100%;
      max-width: 980px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }

    .image-button {
      position: relative;
      display: inline-block;
      text-decoration: none;
      border-radius: 28px;
      outline: none;
      animation: floatButton 3.6s ease-in-out infinite;
      transform-origin: center center;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .image-button:focus-visible {
      box-shadow: 0 0 0 4px rgba(212, 170, 53, 0.3);
      border-radius: 28px;
    }

    .image-button:hover {
      transform: translateY(-6px) rotate(-1deg) scale(1.02);
      filter: brightness(1.03);
      animation-play-state: paused;
    }

    .image-button:active {
      transform: translateY(-1px) scale(0.99);
    }

    .image-button::before {
      content: "";
      position: absolute;
      inset: -12px -18px -24px -18px;
      background: radial-gradient(circle at center, rgba(228, 179, 62, 0.2) 0%, rgba(228, 179, 62, 0) 72%);
      filter: blur(18px);
      z-index: 0;
      pointer-events: none;
      animation: glowPulse 3.6s ease-in-out infinite;
    }

    .balloon-text-image {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      max-width: 640px;
      height: auto;
      filter:
        drop-shadow(0 18px 30px rgba(0, 0, 0, 0.16))
        drop-shadow(0 8px 12px rgba(208, 158, 37, 0.12));
      will-change: transform;
    }

    .view-here-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 34px;
      border-radius: 999px;
      background: #000000;
      color: #ffffff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition:
        transform 0.22s ease,
        background 0.22s ease,
        box-shadow 0.22s ease;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.14);
    }

    .view-here-btn:hover {
      transform: translateY(-2px);
      background: #1b1b1b;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
    }

    .view-here-btn:active {
      transform: translateY(0);
    }

    .view-here-btn svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.22s ease;
    }

    .view-here-btn:hover svg {
      transform: translateX(3px);
    }

    @keyframes floatButton {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      25% {
        transform: translateY(-8px) rotate(-1deg);
      }
      50% {
        transform: translateY(-2px) rotate(1deg);
      }
      75% {
        transform: translateY(-10px) rotate(-0.6deg);
      }
      100% {
        transform: translateY(0px) rotate(0deg);
      }
    }

    @keyframes glowPulse {
      0% {
        opacity: 0.45;
        transform: scale(0.98);
      }
      50% {
        opacity: 0.82;
        transform: scale(1.04);
      }
      100% {
        opacity: 0.45;
        transform: scale(0.98);
      }
    }

    @media (max-width: 640px) {
      .tba-feature-section {
        padding: 56px 16px;
      }

      .balloon-text-image {
        max-width: 92vw;
      }

      .view-here-btn {
        min-height: 50px;
        padding: 0 26px;
        font-size: 0.82rem;
        letter-spacing: 0.1em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .image-button,
      .image-button::before {
        animation: none;
      }

      .image-button:hover,
      .view-here-btn:hover,
      .view-here-btn:hover svg {
        transform: none;
      }
    }
  </style>
</head>
<body>

  <section class="tba-feature-section">
    <div class="tba-feature-inner">
      <a class="image-button" href="next-page.html" aria-label="Open next page">
        <img
          src="assets/Diseño sin título (3).png"
          alt="VA Recruitment Agency"
          class="balloon-text-image"
          loading="eager"
        />
      </a>

      <a class="view-here-btn" href="next-page.html">
        View Here
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M13 5l7 7-7 7"></path>
        </svg>
      </a>
    </div>
  </section>

</body>
</html>
